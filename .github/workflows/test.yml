name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: systemic-engineering/ci/actions/nix-setup@main

      - name: Lint
        run: nix develop -c cargo clippy -- -D warnings

      - name: Test
        run: nix develop -c cargo test

      - name: Format check
        run: nix develop -c cargo fmt -- --check
